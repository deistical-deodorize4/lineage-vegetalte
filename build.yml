# .github/workflows/build.yml
name: Build LineageOS 17.1 + microG

on:
  workflow_dispatch:  # Permite iniciar manualmente desde la interfaz web
  schedule:
    - cron: '0 18 * * 6'  # Opcional: Saturdays 18:00 UTC (cada semana)

jobs:
  sync:
    name: Sync Source Code
    runs-on: ubuntu-latest
    outputs:
      ccache-hash: ${{ steps.hash.outputs.ccache }}
      repo-hash: ${{ steps.hash.outputs.repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev g++-multilib libxml2-utils xsltproc \
            libncurses5-dev libssl-dev python2.7 libmpc-dev libelf-dev \
            openjdk-17-jdk pngcrush schedtool liblz4-tool libxcrypt-dev

      - name: Initialize LineageOS
        run: |
          mkdir -p ~/lineageos/src
          cd ~/lineageos/src
          git config --global user.name "Lumo Bot"
          git config --global user.email "bot@lumo.proton.me"
          
          # Initialize repo
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH
          
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1

      - name: Restore Cache
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/lineageos/src
            ~/.ccache
          key: lineage-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            lineage-${{ runner.os }}-

      - name: Sync Repositories
        run: |
          cd ~/lineageos/src
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Clone Device Trees
        run: |
          cd ~/lineageos/src
          git clone https://github.com/LineageOS/android_device_bq_vegetalte device/bq/vegetalte
          git clone https://github.com/LineageOS/android_kernel_bq_vegetalte kernel/bq/vegetalte
          git clone https://github.com/LineageOS/android_vendor_bq_vegetalte vendor/bq/vegetalte
          # MicroG integration
          git clone https://github.com/microg/GmsCore packages/services/GmsCore

      - name: Save Hashes
        id: hash
        run: |
          echo "ccache=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "repo=$(sha256sum ~/lineageos/src/.repo/project.lock 2>/dev/null || echo 'initial')" >> $GITHUB_OUTPUT

      - name: Cache Everything
        uses: actions/cache@v4
        with:
          path: |
            ~/lineageos/src
            ~/.ccache
          key: lineage-sync-${{ github.sha }}
          restore-keys: |
            lineage-sync-

      - name: Upload Source Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-source
          path: ~/lineageos/src
          retention-days: 7

  build:
    name: Build + microG
    runs-on: ubuntu-latest
    needs: sync
    timeout-minutes: 360  # Límite de 6 horas (máximo GitHub)
    env:
      USE_CCACHE: 1
      CCACHE_DIR: ~/.ccache
    steps:
      - name: Download Source
        uses: actions/download-artifact@v4
        with:
          name: lineage-source
          path: ~/lineageos/src

      - name: Setup CCache
        run: |
          mkdir -p ~/.ccache
          ccache -M 50G
          ccache -z

      - name: Configure microG
        run: |
          cd ~/lineageos/src
          # Agregar patches de signature spoofing
          echo 'PRODUCT_ENFORCE_ARTIFACT_PATH ?= false' >> vendor/lineage/config/common_full_phone.mk
          echo 'MICROG_BUILD_CONFIG := microg' >> vendor/lineage/config/common.mk

      - name: Setup Build Environment
        run: |
          cd ~/lineageos/src
          . build/envsetup.sh
          lunch lineage_vegetalte-userdebug
          mka clobbers

      - name: Compile
        id: build_step
        run: |
          cd ~/lineageos/src
          . build/envsetup.sh
          lunch lineage_vegetalte-userdebug
          mka bacon -j$(nproc)
          
          # Verificar output
          ls -lh out/target/product/vegetalte/*.zip 2>/dev/null || echo "Build artifacts not found"

      - name: Rename Output
        run: |
          cd ~/lineageos/src/out/target/product/vegetalte
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          for zipfile in *.zip; do
            mv "$zipfile" "lineage-17.1-${TIMESTAMP}-UNOFFICIAL-microG-vegetalte.zip"
          done
          mv recovery*.img "recovery-17.1-${TIMESTAMP}-vegetalte.img" 2>/dev/null || true

      - name: Calculate Checksum
        run: |
          cd ~/lineageos/src/out/target/product/vegetalte
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lineage-os-vegetalte
          path: |
            ~/lineageos/src/out/target/product/vegetalte/*.zip
            ~/lineageos/src/out/target/product/vegetalte/*.img
            ~/lineageos/src/out/target/product/vegetalte/SHA256SUMS.txt
          retention-days: 30
          compression-level: 0

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            ~/lineageos/src/out/build.log
            ~/.ccache/ccache.log
          retention-days: 3

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [sync, build]
    if: always()
    steps:
      - name: Check Status
        run: |
          STATUS="${{ needs.build.result }}"
          if [ "$STATUS" == "success" ]; then
            echo "✅ Build completed successfully!"
            echo "Download from Actions tab -> lineage-os-vegetalte artifact"
          elif [ "$STATUS" == "failure" ]; then
            echo "❌ Build failed. Check logs for details."
            echo "Artifacts with logs will be preserved."
          fi
