name: Build LineageOS 17.1 + microG

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'vegetalte'

jobs:
  build:
    name: Build ${{ github.event.inputs.device }}
    runs-on: ubuntu-22.04  # ← CRÍTICO: Ubuntu 24.04 no tiene Python 2.7
    timeout-minutes: 480
    container: ghcr.io/lineageos4microg/docker-lineage-cicd:lineage-17.1  # ← Contenedor con microG y Java 8 preconfigurados
    
    steps:
      - name: Checkout workflow
        uses: actions/checkout@v4
      
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          echo "=== Disk after cleanup ==="
          df -h /
      
      - name: Create local_manifests directory
        run: |
          mkdir -p /srv/android/.repo/local_manifests
      
      - name: Add device trees via local_manifest
        run: |
          cat > /srv/android/.repo/local_manifests/vegetalte.xml << EOFMANIFEST
<?xml version="1.0" encoding="UTF-8"?>
<manifest>
  <project path="device/bq/vegetalte" 
           name="LineageOS/android_device_bq_vegetalte" 
           remote="github" 
           revision="lineage-17.1"/>
  <project path="kernel/bq/msm8226" 
           name="LineageOS/android_kernel_bq_msm8226" 
           remote="github" 
           revision="lineage-17.1"/>
  <project path="vendor/bq/vegetalte" 
           name="LineageOS/android_vendor_bq_vegetalte" 
           remote="github" 
           revision="lineage-17.1"/>
</manifest>
EOFMANIFEST
          echo "Local manifest created:"
          cat /srv/android/.repo/local_manifests/vegetalte.xml
      
      - name: Initialize LineageOS for microG
        run: |
          cd /srv/android
          repo init -u https://github.com/LineageOS/android.git \
                     -b lineage-17.1 \
                     --git-lfs
          echo "Repo initialized successfully"
      
      - name: Sync source code
        run: |
          cd /srv/android
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)
          echo "Sync completed"
          du -sh /srv/android
      
      - name: Apply signature spoofing patch
        run: |
          cd /srv/android
          git fetch https://review.lineageos.org/android_frameworks/base HEAD:refs/heads/test
          git cherry-pick 6d2955f0bd55e9938d5d49415182c27b50900b95 || echo "Patch already applied or not needed for LOS 17.1"
      
      - name: Start build
        run: |
          cd /srv/android
          . build/envsetup.sh
          lunch lineage_${{ github.event.inputs.device }}-userdebug
          mka bacon -j$(nproc) 2>&1 | tee /tmp/build.log
          echo "Build completed"
      
      - name: Verify artifacts
        run: |
          ls -lh /srv/android/out/target/product/${{ github.event.inputs.device }}/*.zip || \
            (echo "ERROR: No build output found!" && exit 1)
      
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-${{ github.event.inputs.device }}-microg-${{ github.run_number }}
          path: /srv/android/out/target/product/${{ github.event.inputs.device }}/*.zip
          retention-days: 7
          if-no-files-found: error
      
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            /tmp/build.log
            /srv/android/out/build.log
          retention-days: 7
          if-no-files-found: ignore
