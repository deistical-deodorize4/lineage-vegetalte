name: Build LineageOS 17.1 + microG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/lineageos/container-builder:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            g++-multilib libxml2-utils xsltproc libncurses5-dev libssl-dev \
            python2.7 libmpc-dev libelf-dev openjdk-17-jdk pngcrush \
            schedtool liblz4-tool libxcrypt-dev bc cpio

      - name: Initialize LineageOS
        run: |
          mkdir -p ~/lineageos/bin ~/lineageos/src
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/lineageos/bin/repo
          chmod a+x ~/lineageos/bin/repo
          export PATH=~/lineageos/bin:$PATH
          
          cd ~/lineageos/src
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1

      - name: Cache Repo
        uses: actions/cache@v4
        with:
          path: |
            ~/lineageos/src/.repo
          key: lineage-${{ runner.os }}-${{ hashFiles('**/.repo/project.lock') }}
          restore-keys: |
            lineage-${{ runner.os }}-

      - name: Sync Repositories
        run: |
          cd ~/lineageos/src
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Clone Device Trees
        run: |
          cd ~/lineageos/src
          git clone https://github.com/LineageOS/android_device_bq_vegetalte device/bq/vegetalte
          git clone https://github.com/LineageOS/android_kernel_bq_vegetalte kernel/bq/vegetalte
          git clone https://github.com/LineageOS/android_vendor_bq_vegetalte vendor/bq/vegetalte

      - name: Upload Source Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-source
          path: ~/lineageos/src
          retention-days: 7
          compression-level: 0

  build:
    name: Build + microG
    runs-on: ubuntu-24.04
    needs: sync
    timeout-minutes: 360
    env:
      USE_CCACHE: 1
      CCACHE_DIR: ~/.ccache
    steps:
      - name: Download Source
        uses: actions/download-artifact@v4
        with:
          name: lineage-source
          path: ~/lineageos/src

      - name: Setup CCache
        run: |
          sudo apt-get install -y ccache
          mkdir -p ~/.ccache
          ccache -M 50G
          echo "CCACHE_SIZE=50G" >> $GITHUB_ENV

      - name: Setup Build Environment
        run: |
          cd ~/lineageos/src
          source build/envsetup.sh
          lunch lineage_vegetalte-userdebug
          export PATH=$HOME/lineageos/bin:$PATH

      - name: Compile
        run: |
          cd ~/lineageos/src
          source build/envsetup.sh
          lunch lineage_vegetalte-userdebug
          mka bacon -j$(nproc) 2>&1 | tee /tmp/build.log

      - name: Rename Output
        run: |
          cd ~/lineageos/src/out/target/product/vegetalte
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          for zipfile in *.zip; do
            mv "$zipfile" "lineage-17.1-${TIMESTAMP}-UNOFFICIAL-microG-vegetalte.zip"
          done
          sha256sum *.zip > SHA256SUMS.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lineage-os-vegetalte
          path: |
            ~/lineageos/src/out/target/product/vegetalte/*.zip
            ~/lineageos/src/out/target/product/vegetalte/SHA256SUMS.txt
          retention-days: 30
          compression-level: 0

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            /tmp/build.log
            ~/.ccache/ccache.log
          retention-days: 7
