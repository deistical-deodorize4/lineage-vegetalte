name: Build LineageOS 17.1

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename (e.g., vegetalte)'
        required: true
        default: 'vegetalte'

jobs:
  build:
    name: Build ROM for ${{ github.event.inputs.device }}
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
      - name: Checkout workflow
        uses: actions/checkout@v4

      - name: Export device variable
        run: echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" \
            "$AGENT_TOOLSDIRECTORY" /tmp/* /var/tmp/*
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo rm -rf /var/cache/apt/archives/*
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            g++-multilib libxml2-utils xsltproc libncurses5-dev libssl-dev \
            bc python-is-python3 libmpc-dev libelf-dev pngcrush schedtool \
            liblz4-tool libxcrypt-dev ccache wget lftp
          # Try to get python2.7 from deadsnakes PPA if available
          sudo add-apt-repository ppa:fkrull/deadsnakes -y || true
          sudo apt-get update
          sudo apt-get install -y python2.7 || echo "Python 2.7 not available, using alternatives"

      - name: Create workspace
        run: mkdir -p ~/android

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Create local_manifests directory
        run: mkdir -p ~/android/.repo/local_manifests

      - name: Add device trees via local_manifest
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > ~/android/.repo/local_manifests/${DEVICE}.xml
          echo '<manifest>' >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo "  <project path=\"device/bq/${DEVICE}\" name=\"LineageOS/android_device_bq_${DEVICE}\" remote=\"github\" revision=\"lineage-17.1\" />" >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo "  <project path=\"kernel/bq/msm8226\" name=\"LineageOS/android_kernel_bq_msm8226\" remote=\"github\" revision=\"lineage-17.1\" />" >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo "  <project path=\"vendor/bq/${DEVICE}\" name=\"LineageOS/android_vendor_bq_${DEVICE}\" remote=\"github\" revision=\"lineage-17.1\" />" >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo '</manifest>' >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo "Local manifest created:"
          cat ~/android/.repo/local_manifests/${DEVICE}.xml

      - name: Initialize LineageOS
        run: |
          cd ~/android
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --git-lfs
          echo "Repo initialized"

      - name: Retry repo sync
        run: |
          cd ~/android
          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY+1)) of $MAX_RETRIES"
            repo sync -c --force-sync --no-clone-bundle --no-tags -j4 || {
              RETRY=$((RETRY+1))
              if [ $RETRY -lt $MAX_RETRIES ]; then
                echo "Retrying in 30 seconds..."
                sleep 30
              else
                echo "Failed after $MAX_RETRIES attempts"
                exit 1
              fi
            }
          done
          echo "Sync completed successfully"
          du -sh ~/android

      - name: Set up ccache
        run: |
          ccache -M 50G
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV

      - name: Start build
        run: |
          cd ~/android
          source build/envsetup.sh
          lunch lineage_${DEVICE}-userdebug
          mka bacon -j$(nproc) 2>&1 | tee /tmp/build.log

      - name: Rename output
        run: |
          cd ~/android/out/target/product/${DEVICE}
          TS=$(date +%Y%m%d_%H%M%S)
          for f in *.zip; do
            mv "$f" "lineage-17.1-${TS}-UNOFFICIAL-${DEVICE}.zip"
          done
          sha256sum *.zip > SHA256SUMS.txt
          echo "Output renamed and checksummed"

      - name: Verify artifacts
        run: |
          ls -lh ~/android/out/target/product/${DEVICE}/*.zip || { echo "ERROR: No output!"; exit 1; }

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-${{ env.DEVICE }}
          path: |
            ~/android/out/target/product/${DEVICE}/*.zip
            ~/android/out/target/product/${DEVICE}/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ env.DEVICE }}
          path: /tmp/build.log
          retention-days: 7
          if-no-files-found: ignore
