name: Build LineageOS 17.1 + microG

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename (e.g., vegetalte)'
        required: true
        default: 'vegetalte'

jobs:
  build:
    name: Build ROM for ${{ github.event.inputs.device }}
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
      - name: Checkout workflow
        uses: actions/checkout@v4

      - name: Export device variable
        run: echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost"
          sudo apt-get clean && sudo apt-get autoremove -y
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            g++-multilib libxml2-utils xsltproc libncurses5-dev libssl-dev \
            bc python2.7 libmpc-dev libelf-dev pngcrush schedtool \
            liblz4-tool libxcrypt-dev ccache repo

      - name: Create workspace
        run: mkdir -p ~/android

      - name: Create local_manifests directory
        run: mkdir -p ~/android/.repo/local_manifests

      - name: Add device trees via local_manifest
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > ~/android/.repo/local_manifests/${DEVICE}.xml
          echo '<manifest>' >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo "  <project path=\"device/bq/${DEVICE}\" name=\"LineageOS/android_device_bq_${DEVICE}\" remote=\"github\" revision=\"lineage-17.1\" />" >> ~/android/.repo/local_manifests/${DEVICE}.xml
          echo "  <project path=\"kernel/bq/msm8226\" name=\"LineageOS/andr
